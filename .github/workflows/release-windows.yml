name: Release Windows updater

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run release:windows:prebuilt

      - name: Publish Gemini CLI extension branch
        run: node scripts/publish-gemini-cli-extension-branch.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/gemini-md-export-windows-prebuilt.zip
            release/gemini-md-export-windows-prebuilt-v*.zip
            release/update-windows.ps1
